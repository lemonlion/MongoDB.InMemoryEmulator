name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-inmemory:
    name: Tests (In-Memory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: inmemory
      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt; ! grep -q "has the following vulnerable packages" vulnerability-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-inmemory
          path: '**/*.trx'

  test-mongodb:
    name: Tests (Real MongoDB)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0.14
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Initialize replica set
        run: |
          docker exec $(docker ps -q --filter "ancestor=mongo:7.0.14") \
            mongosh --quiet --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"
          sleep 3
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly&Target!=AtlasOnly" --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: mongodb
          MONGO_CONNECTION_STRING: "mongodb://localhost:27017/?replicaSet=rs0&directConnection=true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-mongodb
          path: '**/*.trx'
