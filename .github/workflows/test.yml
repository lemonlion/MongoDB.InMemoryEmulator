name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-inmemory:
    name: Tests (In-Memory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: inmemory
      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt; ! grep -q "has the following vulnerable packages" vulnerability-report.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-inmemory
          path: '**/*.trx'

  test-mongodb:
    name: Tests (Real MongoDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Start MongoDB with replica set
        run: |
          docker run -d --name mongodb -p 27017:27017 mongo:7.0.14 --replSet rs0
          for i in $(seq 1 30); do
            docker exec mongodb mongosh --quiet --eval "db.runCommand({ping:1}).ok" && break
            sleep 1
          done
      - name: Initialize replica set
        run: |
          docker exec mongodb mongosh --quiet --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"
          sleep 3
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly&Target!=AtlasOnly" --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: mongodb
          MONGO_CONNECTION_STRING: "mongodb://localhost:27017/?replicaSet=rs0&directConnection=true"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-mongodb
          path: '**/*.trx'
