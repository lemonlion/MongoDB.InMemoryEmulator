name: Weekly Atlas Parity

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  atlas-parity:
    name: Tests (MongoDB Atlas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly" --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: atlas
          MONGO_CONNECTION_STRING: ${{ secrets.ATLAS_CONNECTION_STRING }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-atlas-parity-results
          path: '**/*.trx'

  latest-mongo-compat:
    name: Tests (Latest MongoDB)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Initialize replica set
        run: |
          docker exec $(docker ps -q --filter "ancestor=mongo:latest") \
            mongosh --quiet --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"
          sleep 3
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly&Target!=AtlasOnly" --logger "trx;LogFileName=results.trx"
        env:
          MONGO_TEST_TARGET: mongodb
          MONGO_CONNECTION_STRING: "mongodb://localhost:27017/?replicaSet=rs0&directConnection=true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: latest-mongo-compat-results
          path: '**/*.trx'
